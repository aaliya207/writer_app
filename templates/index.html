<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Writer</title>

    <!-- Google Fonts: Cinzel (display) + Crimson Pro (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

    <!-- Our CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<aside class="sidebar" id="sidebar">

    <!-- App Logo -->
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">⚔️</span>
            <span class="logo-text">Lorewriter</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">&#9776;</button>
    </div>

    <!-- New Project Button -->
    <div class="sidebar-actions">
        <button class="btn-primary" id="newProjectBtn">+ New Project</button>
    </div>

    <!-- Projects List -->
    <nav class="projects-nav">
        <p class="nav-label">PROJECTS</p>
        <ul class="projects-list" id="projectsList">
            <!-- Dynamically populated by JS -->
            <li class="empty-state">No projects yet.<br>Create one above.</li>
        </ul>
    </nav>

    <!-- Documents List (shown when a project is selected) -->
    <nav class="documents-nav" id="documentsNav" style="display:none;">
        <div class="nav-label-row">
            <p class="nav-label">CHAPTERS</p>
            <button class="btn-icon" id="newDocBtn" title="New chapter">+</button>
        </div>
        <ul class="documents-list" id="documentsList">
            <!-- Dynamically populated by JS -->
        </ul>
    </nav>

    <!-- Bottom controls -->
    <div class="sidebar-footer">
        <button class="btn-ghost" id="darkModeToggle">🌙 Dark Mode</button>
        <span class="version">v0.1.0</span>
    </div>
</aside>

<!-- ========== MAIN EDITOR AREA ========== -->
<main class="editor-area" id="editorArea">

    <!-- Top bar -->
    <header class="editor-header">
        <div class="doc-title-wrap">
            <input 
                type="text" 
                id="docTitleInput" 
                class="doc-title-input" 
                placeholder="Untitled Chapter..."
                disabled
            >
        </div>
        <div class="header-actions">
            <span class="save-status" id="saveStatus">—</span>
            <button class="btn-ghost" id="exportPdfBtn" disabled>↓ PDF</button>
            <button class="btn-ghost" id="exportDocxBtn" disabled>↓ DOCX</button>
            <button class="btn-accent" id="saveBtn" disabled>Save</button>
        </div>
    </header>

    <!-- Quill Editor -->
    <div class="editor-wrapper">
        <div id="quillEditor"></div>
    </div>

    <!-- Empty/Welcome State -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="welcome-glyph">📖</div>
            <h1 class="welcome-title">Lorewriter</h1>
            <p class="welcome-sub">Your world. Your words. Your legend.</p>
            <p class="welcome-hint">← Create a project to begin writing</p>
        </div>
    </div>

</main>

<!-- ========== MODALS ========== -->

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
    <div class="modal">
        <h2 class="modal-title">New Project</h2>
        <label class="modal-label">Project Title</label>
        <input type="text" class="modal-input" id="projectTitleInput" placeholder="e.g. Fire Clan Arc">
        <label class="modal-label">Description (optional)</label>
        <textarea class="modal-textarea" id="projectDescInput" placeholder="What's this story about?"></textarea>
        <div class="modal-actions">
            <button class="btn-ghost" id="cancelProjectBtn">Cancel</button>
            <button class="btn-primary" id="confirmProjectBtn">Create Project</button>
        </div>
    </div>
</div>

<!-- New Document Modal -->
<div class="modal-overlay" id="newDocModal">
    <div class="modal">
        <h2 class="modal-title">New Chapter</h2>
        <label class="modal-label">Chapter Title</label>
        <input type="text" class="modal-input" id="docTitleModalInput" placeholder="e.g. The Awakening">
        <div class="modal-actions">
            <button class="btn-ghost" id="cancelDocBtn">Cancel</button>
            <button class="btn-primary" id="confirmDocBtn">Create Chapter</button>
        </div>
    </div>
</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<!-- Our JS -->
<script src="/static/js/main.js"></script>

</body>
</html>
